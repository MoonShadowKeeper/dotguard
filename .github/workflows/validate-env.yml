name: Validate Environment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-env:
    name: 🛡️ Validate .env schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate environment schema (using local dotguard)
        run: node bin/dotguard.js validate --ci || true

  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    needs: validate-env

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: node test/run.js
