name: Validate Environment

on:
  push:
    branches: [main]
    paths:
      - '.env.example'
      - '.dotguardrc.json'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - '.env.example'
      - '.dotguardrc.json'
      - 'src/**'

jobs:
  validate-env:
    name: 🛡️ Validate .env schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate environment schema
        run: npx dotguard validate --strict --format compact

  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    needs: validate-env

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node test/run.js
